<title id="title">Architecture Diagram - TimePro Tools</title>
<desc id="desc">TimePro Web API at the top. Human users, scripts, CLI, MCP host, and AI agents below. Agents can use the CLI, MCP tools, direct API access when configured, and workspace tools such as files, Git, GitHub, and Azure DevOps.</desc>
