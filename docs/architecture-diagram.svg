<text x="814" y="133" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="814" dy="0">TimePro Web API</tspan></text>
<text x="800" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333"><tspan x="800" dy="0">Source system for timesheets, leave, invoices, CRM bookings, and auth</tspan></text>
<text x="294" y="347" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#333333"><tspan x="294" dy="0">Local tp executable</tspan></text>
<text x="294" y="372" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#797979"><tspan x="294" dy="0">One installed .NET tool. CLI and tp mcp share one TimePro client.</tspan></text>
<text x="814" y="403" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="814" dy="0">Shared TimePro client</tspan></text>
<text x="800" y="446" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="800" dy="0">Auth headers + HTTP calls</tspan></text>
<text x="524" y="543" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="524" dy="0">CLI command mode</tspan></text>
<text x="510" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="510" dy="0">`tp ts get`, `tp scrum`, scripts</tspan></text>
<text x="1104" y="543" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="1104" dy="0">tp mcp mode</tspan></text>
<text x="1090" y="586" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="1090" dy="0">MCP server over stdio</tspan></text>
<text x="814" y="568" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="814" dy="0">Local config</tspan></text>
<text x="800" y="611" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="800" dy="0">~/.config/timepro-cli</tspan></text>
<text x="379" y="758" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="379" dy="0">Human users</tspan></text>
<text x="365" y="801" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="365" dy="0">Terminal, scripts, launchd, CI</tspan></text>
<text x="814" y="758" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="814" dy="0">AI agents</tspan></text>
<text x="800" y="801" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="800" dy="0">Claude Code, Codex, Copilot</tspan></text>
<text x="1249" y="758" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#FFFFFF"><tspan x="1249" dy="0">Workspace context</tspan></text>
<text x="1235" y="801" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="#333333"><tspan x="1235" dy="0">Files, Git, GitHub, Azure DevOps</tspan></text>
