<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
<title id="title">Architecture Diagram - TimePro Tools</title>
<desc id="desc">TimePro Web API is at the top. The local tp executable has CLI command mode and tp mcp mode. Both modes share the same TimePro client and local config. Human users, scripts, and AI agents use tp; agents can also use workspace context and optional direct API access when configured.</desc>
